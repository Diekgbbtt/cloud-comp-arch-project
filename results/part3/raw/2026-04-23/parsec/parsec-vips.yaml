apiVersion: batch/v1
kind: Job
metadata:
  name: parsec-vips
  labels:
    name: parsec-vips
spec:
  template:
    spec:
      containers:
      - image: anakli/cca:parsec_vips
        name: parsec-vips
        imagePullPolicy: IfNotPresent
        command: ["/bin/sh"]
        args: ["-c", "./run -a run -S parsec -p vips -i native -n 4"]
        resources:
          requests:
            cpu: "3"
            # memory: "1Gi"
          limits:
            cpu: "4"
            # memory: "10Gi"
      restartPolicy: Never
      nodeSelector:
        cca-project-nodetype: "node-b-4core"
