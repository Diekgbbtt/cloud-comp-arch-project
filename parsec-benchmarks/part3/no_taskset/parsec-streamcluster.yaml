apiVersion: batch/v1
kind: Job
metadata:
  name: parsec-streamcluster
  labels:
    name: parsec-streamcluster
spec:
  template:
    spec:
      containers:
      - image: anakli/cca:parsec_streamcluster
        name: parsec-streamcluster
        imagePullPolicy: IfNotPresent
        command: ["/bin/sh"]
        args: ["-c", "./run -a run -S parsec -p streamcluster -i native -n 2"]
        resources:
          requests:
            cpu: "1"
            # memory: "2Gi"
          limits:
            cpu: "2"
            # memory: "2Gi"
      restartPolicy: Never
      nodeSelector:
        cca-project-nodetype: "node-b-4core"
