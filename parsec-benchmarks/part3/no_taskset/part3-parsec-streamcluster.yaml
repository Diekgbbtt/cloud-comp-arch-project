apiVersion: batch/v1
kind: Job
metadata:
  name: parsec-streamcluster
  labels:
    name: parsec-streamcluster
spec:
  template:
    spec:
      containers:
      - image: anakli/cca:parsec_streamcluster
        name: parsec-streamcluster
        imagePullPolicy: IfNotPresent
        command: ["/bin/sh"]
        args: ["-c", "./run -a run -S parsec -p streamcluster -i native -n 4"]
        resources:
          requests:
            cpu: "4"
            memory: "2Gi"
          limits:
            cpu: "4"
            memory: "2Gi"
      restartPolicy: Never
      nodeSelector:
        cca-project-nodetype: "node-a-8core"
