apiVersion: batch/v1
kind: Job
metadata:
  name: parsec-blackscholes
  labels:
    name: parsec-blackscholes
spec:
  template:
    spec:
      containers:
      - image: anakli/cca:parsec_blackscholes
        name: parsec-blackscholes
        imagePullPolicy: IfNotPresent
        command: ["/bin/sh"]
        args: ["-c", "./run -a run -S parsec -p blackscholes -i native -n 2"]
        resources:
          requests:
            cpu: "1"
            # memory: "512Mi"
          limits:
            cpu: "2"
            # memory: "2Gi"
      restartPolicy: Never
      nodeSelector:
        cca-project-nodetype: "node-b-4core"
