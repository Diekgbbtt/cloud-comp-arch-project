apiVersion: batch/v1
kind: Job
metadata:
  name: parsec-canneal
  labels:
    name: parsec-canneal
spec:
  template:
    spec:
      containers:
      - image: anakli/cca:parsec_canneal
        name: parsec-canneal
        imagePullPolicy: IfNotPresent
        command: ["/bin/sh"]
        args: ["-c", "taskset -c 4-7 ./run -a run -S parsec -p canneal -i native -n 4"]
        resources:
          requests:
            cpu: "3"
            # memory: "1Gi"
          limits:
            cpu: "6"
            # memory: "1Gi"
      restartPolicy: Never
      nodeSelector:
        cca-project-nodetype: "node-a-8core"
